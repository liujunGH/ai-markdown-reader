name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine32 wine64 xvfb
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 3

      - name: Install dependencies
        run: npm ci

      - name: Build Electron App
        run: |
          npm run electron:compile
          npm run build

      - name: Build Windows
        run: npx electron-builder --win --config.asar=false --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS
        if: false  # Skip macOS on Ubuntu
        run: npx electron-builder --mac --config.asar=false

      - name: Build Linux
        if: false  # Skip Linux on Ubuntu
        run: npx electron-builder --linux --config.asar=false

      - name: Upload to Release
        run: |
          # Check if release exists, create if not, edit if it does
          if gh release view ${{ github.ref_name }} >/dev/null 2>&1; then
            echo "Release exists, updating..."
            gh release edit ${{ github.ref_name }} --title "AI Markdown Reader ${{ github.ref_name }}" --notes "Windows portable build"
          else
            echo "Creating new release..."
            gh release create ${{ github.ref_name }} --title "AI Markdown Reader ${{ github.ref_name }}" --notes "Windows portable build"
          fi
          cd release
          for f in *.exe; do
            echo "Uploading $f..."
            gh release upload ${{ github.ref_name }} "$f" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
