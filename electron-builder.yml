appId: com.markdownreader.app
productName: Markdown Reader
copyright: Copyright © 2026 liujun
# Icon: place a 1024x1024 PNG at build/icon.png (or .icns for mac, .ico for win)
# electron-builder will auto-detect platform-specific formats from build/icon.*
# If no icon is provided, the default Electron icon is used.

directories:
  output: release
  buildResources: build

electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/

files:
  - dist/**/*
  - electron/main.js
  - electron/preload.js
  - package.json

extraResources:
  - from: electron/preload.js
    to: electron/preload.js

extraMetadata:
  main: electron/main.js

# Ad-hoc signing when no real Apple Developer ID certificate is available.
# This allows the app to run on macOS with right-click > Open.
# To enable proper code signing, add CSC_LINK / CSC_KEY_PASSWORD secrets to GitHub.
afterSign: build/afterSign.js

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}.${ext}

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}
  category: public.app-category.productivity

linux:
  target:
    - AppImage
    - deb
  artifactName: ${productName}-${version}.${ext}
  category: Office

fileAssociations:
  - ext: md
    name: Markdown Document
    description: Markdown Document
    mimeType: text/markdown
    role: Editor
  - ext: markdown
    name: Markdown Document
    description: Markdown Document
    mimeType: text/markdown
    role: Editor

publish:
  provider: github
  owner: liujunGH
  repo: ai-markdown-reader
